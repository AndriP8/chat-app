# Fly.io configuration for chat-app backend
app = "chat-app-backend"
primary_region = "sin"  # Singapore, adjust to your preference

[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = "tcp"
  internal_port = 3001
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[services.tcp_checks]]
  grace_period = "30s"
  interval = "15s"
  timeout = "10s"

[checks]
  [checks.http_health]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "10s"
