name: Playwright E2E Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: pnpm/action-setup@v4
      with:
        version: 10
        
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Set up Environment Variables
      run: |
        cp packages/backend/.env.example packages/backend/.env
        sed -i 's/NODE_ENV=production/NODE_ENV=development/g' packages/backend/.env
        sed -i 's|CORS_ORIGIN=.*|CORS_ORIGIN=http://localhost:5173|g' packages/backend/.env
        
    - name: Start Database
      run: pnpm run db:start
      
    - name: Install dependencies
      run: pnpm install
      
    - name: Install Playwright Browsers
      run: pnpm --filter @chat-app/frontend exec playwright install --with-deps chromium
      
    - name: Push Database Schema
      run: pnpm --filter @chat-app/backend run db:push
      
    - name: Run Playwright tests
      run: pnpm --filter @chat-app/frontend run test:e2e
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: packages/frontend/playwright-report/
        retention-days: 30
