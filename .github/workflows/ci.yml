name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome lint
        run: pnpm lint

      - name: Run type check
        run: pnpm type-check

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @chat-app/backend run build

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/dist
          retention-days: 7
          if-no-files-found: error

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @chat-app/frontend run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist
          retention-days: 7
          if-no-files-found: error

  e2e:
    name: Playwright E2E Tests
    needs: lint-and-typecheck
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Set up Environment Variables
        run: |
          cp packages/backend/.env.example packages/backend/.env

          sed -i 's/NODE_ENV=production/NODE_ENV=development/g' packages/backend/.env
          sed -i 's/HOST=127.0.0.1/HOST=0.0.0.0/g' packages/backend/.env
          sed -i 's|CORS_ORIGIN=.*|CORS_ORIGIN=http://localhost:5173|g' packages/backend/.env

          echo "POSTGRES_USER=chatapp"     >> .env
          echo "POSTGRES_PASSWORD=password" >> .env
          echo "POSTGRES_DB=chatapp"        >> .env
          echo "POSTGRES_PORT=5432"         >> .env

      - name: Start Database
        run: pnpm run db:start

      - name: Wait for Postgres to be ready
        run: |
          echo "Waiting for Postgres..."
          timeout 60 bash -c \
            'until docker compose exec -T postgres pg_isready -U chatapp; do
               echo "  still waiting..."; sleep 2
             done'
          echo "Postgres is ready!"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter @chat-app/frontend exec playwright install --with-deps chromium

      - name: Push Database Schema
        run: pnpm --filter @chat-app/backend run db:push

      - name: Run Playwright tests
        env:
          VITE_API_BASE_URL: http://localhost:3001/api
        run: pnpm --filter @chat-app/frontend run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30

  deploy-backend:
    name: Deploy Backend to Fly.io
    needs: [e2e, build-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @chat-app/backend db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions@master
        with:
          args: 'deploy --config packages/backend/fly.toml'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}