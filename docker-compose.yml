services:
  postgres:
    image: postgres:17-alpine
    container_name: chat-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-chat_app_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chatapp_user}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
